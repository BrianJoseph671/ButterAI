commands:
  install: npm install
  dev: npm run dev
  build: npm run build
  test: npx vitest run
  typecheck: npx tsc --noEmit
  lint: npm run lint

services:
  web:
    start: npm run dev
    stop: powershell -Command "Get-NetTCPConnection -LocalPort 3000 -ErrorAction SilentlyContinue | ForEach-Object { Stop-Process -Id $_.OwningProcess -Force -ErrorAction SilentlyContinue }"
    healthcheck: curl.exe -sf http://localhost:3000
    port: 3000
    depends_on: []
